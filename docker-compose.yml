services:
  djimitflo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djimitflo
    ports:
      - "${DJIMITFLO_HOST_PORT:-3001}:3001"
    env_file:
      - .env.docker
    volumes:
      - djimitflo-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  djimitflo-data:
    driver: local